kind = "web"
previewPath = "/"
title = "Hermes"
version = "1.0.0"
id = "artifacts/hermes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18184

[services.development]
run = "pnpm --filter @workspace/hermes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hermes", "run", "build" ]
publicDir = "artifacts/hermes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18184"
BASE_PATH = "/"
